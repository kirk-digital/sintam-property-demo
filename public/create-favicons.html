<!DOCTYPE html>
<html>
<head>
<script>
// Simple script to create favicon PNGs from SVG
// This will be run in browser to generate PNGs
const canvas = document.createElement('canvas');
canvas.width = 180;
canvas.height = 180;
const ctx = canvas.getContext('2d');
const img = new Image();
img.onload = function() {
  ctx.drawImage(img, 0, 0, 180, 180);
  // Export as PNG
  canvas.toBlob(function(blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'apple-touch-icon.png';
    a.click();
  });
};
img.src = '/logo.svg';
</script>
</head>
<body>Open browser console and run this</body>
</html>
